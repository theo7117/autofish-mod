name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Download and install Gradle 8.11
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11-bin.zip -P /tmp
          sudo unzip -q -d /opt/gradle /tmp/gradle-8.11-bin.zip
          echo "/opt/gradle/gradle-8.11/bin" >> $GITHUB_PATH

      - name: Build with Gradle
        run: gradle build --stacktrace

      - name: Upload built mod jar
        uses: actions/upload-artifact@v4
        with:
          name: autofish-mod
          path: build/libs/*.jar
